<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clover Labs - Operating System Portal</title>
    <style>
        /* ==========================================================================
           1. EL VERDADERO FONDO FRUTIGER AERO DE ALTA FIDELIDAD
           ========================================================================== */
        body {
            margin: 0; padding: 0; height: 100vh; box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden;
            display: flex; justify-content: center; align-items: center; position: relative;
            
            /* Paleta icónica 2006: Azul océano profundo a verde naturaleza hiper-saturada */
            background: #103c6f;
            background-image: 
                radial-gradient(circle at 80% 20%, #46e089 0%, transparent 55%),
                radial-gradient(circle at 20% 80%, #29abe2 0%, transparent 60%),
                linear-gradient(135deg, #1d72b8 0%, #0d2c54 60%, #06183a 100%);
        }

        /* Ondas y destellos de luz curvos realistas de la era Windows Vista */
        body::before {
            content: ""; position: absolute; top: -10%; left: -20%; width: 140%; height: 60%;
            background: radial-gradient(ellipse at 50% 0%, rgba(255,255,255,0.25) 0%, rgba(255,255,255,0) 70%);
            border-bottom: 2px solid rgba(255, 255, 255, 0.15);
            transform: rotate(-5deg); pointer-events: none; z-index: 1;
        }

        body::after {
            content: ""; position: absolute; bottom: 0; left: 0; right: 0; height: 35%;
            background: linear-gradient(0deg, rgba(70, 224, 137, 0.15) 0%, rgba(255,255,255,0) 100%);
            pointer-events: none; z-index: 1;
        }

        /* Sistema de Burbujas de Agua flotando de verdad en el fondo */
        .bubble-generator {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; z-index: 2;
        }
        .water-bubble {
            position: absolute; bottom: -50px; background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.35); border-radius: 50%;
            box-shadow: inset 1px 1px 3px rgba(255,255,255,0.6), inset -2px -2px 5px rgba(0,0,0,0.1), 0 4px 10px rgba(0,30,60,0.15);
            animation: floatUp 8s infinite linear;
        }
        /* Brillo interno glossy para cada burbuja líquida */
        .water-bubble::after {
            content: ""; position: absolute; top: 15%; left: 20%; width: 30%; height: 15%;
            background: rgba(255,255,255,0.5); border-radius: 50%;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) translateX(0) scale(0.8); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-110vh) translateX(30px) scale(1.1); opacity: 0; }
        }

        /* ==========================================================================
           2. INTERFAZ DE VENTANA FIDELIDAD WINDOWS AERO (Bordes de cristal grueso)
           ========================================================================== */
        .aero-window {
            width: 460px; height: 440px;
            background: rgba(255, 255, 255, 0.22);
            backdrop-filter: blur(25px) saturate(170%); -webkit-backdrop-filter: blur(25px) saturate(170%);
            border: 4px solid rgba(255, 255, 255, 0.4);
            border-top: 4px solid rgba(255, 255, 255, 0.55);
            border-radius: 8px; box-shadow: 0 25px 65px rgba(0, 15, 40, 0.5), inset 0 1px 0 rgba(255,255,255,0.5);
            overflow: hidden; box-sizing: border-box; z-index: 10; position: relative; display: flex; flex-direction: column;
        }

        .window-header {
            background: linear-gradient(180deg, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0.08) 50%, rgba(0,0,0,0.06) 50.1%, rgba(0,0,0,0.02) 100%);
            padding: 10px 14px; color: white; font-size: 12px; font-weight: 600; height: 40px; box-sizing: border-box;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.7); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(0, 0, 0, 0.15); user-select: none;
        }

        .window-controls { display: flex; gap: 4px; }
        .window-controls span {
            width: 28px; height: 16px; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25); border-radius: 2px; cursor: pointer; position: relative;
        }
        .window-controls span::after {
            content: ""; position: absolute; left: 8px; width: 12px; height: 2px; background: rgba(255,255,255,0.8);
        }
        .window-controls .min-btn::after { bottom: 4px; }
        .window-controls .max-btn::after { top: 4px; height: 7px; width: 10px; border: 1px solid rgba(255,255,255,0.8); background: transparent; left: 8px; }
        .window-controls .close-btn {
            background: linear-gradient(180deg, rgba(235, 90, 90, 0.5) 0%, rgba(180, 40, 40, 0.5) 100%); border-color: rgba(255,100,100,0.4);
        }
        .window-controls .close-btn:hover {
            background: linear-gradient(180deg, #ff5c5c 0%, #cc1122 100%); border-color: #990000; box-shadow: 0 0 8px rgba(255,0,0,0.6);
        }

        .window-body { background: linear-gradient(180deg, rgba(255,255,255,0.96) 0%, rgba(243,248,252,0.98) 100%); flex: 1; padding: 22px 30px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: space-between; }

        /* ==========================================================================
           3. EL TRÉBOL DE 4 HOJAS ANIMADO (Ciclo de regeneración de hojas)
           ========================================================================== */
        .logo-container { display: flex; flex-direction: column; align-items: center; margin-bottom: 10px; }
        
        .clover-container { position: relative; width: 80px; height: 72px; margin-bottom: 3px; }
        .clover-stem {
            position: absolute; width: 4px; height: 22px; background: #1b733b;
            bottom: 2px; left: 38px; border-radius: 0 0 4px 4px; transform: rotate(10deg); z-index: 1;
        }

        .clover-leaf {
            position: absolute; width: 32px; height: 32px;
            background: linear-gradient(135deg, #a8fbc0 0%, #2ecc71 45%, #1e8449 100%);
            border-radius: 50% 50% 50% 0; box-shadow: inset -1px -1px 3px rgba(0,0,0,0.25), inset 1px 1px 4px rgba(255,255,255,0.7);
        }

        .leaf-top-left  { top: 5px; left: 24px; transform: rotate(-45deg); animation: cycleLeaf 4s infinite ease-in-out; }
        .leaf-top-right { top: 21px; left: 38px; transform: rotate(45deg); animation: cycleLeaf 4s infinite ease-in-out 1s; }
        .leaf-bot-right { top: 37px; left: 24px; transform: rotate(135deg); animation: cycleLeaf 4s infinite ease-in-out 2s; }
        .leaf-bot-left  { top: 21px; left: 10px; transform: rotate(225deg); animation: cycleLeaf 4s infinite ease-in-out 3s; }

        .clover-glass-shimmer {
            position: absolute; top: 7px; left: 18px; width: 44px; height: 20px;
            background: linear-gradient(180deg, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0) 100%);
            border-radius: 22px / 10px; pointer-events: none; z-index: 5;
        }

        @keyframes cycleLeaf {
            0% { transform: scale(1) translate(0, 0) rotate(var(--rot, 0deg)); opacity: 1; }
            30% { transform: scale(1.05) translate(0, 2px) rotate(calc(var(--rot, 0deg) + 5deg)); opacity: 1; }
            55% { transform: scale(0.9) translate(0, 25px) rotate(calc(var(--rot, 0deg) + 40deg)); opacity: 0; }
            75% { transform: scale(0) translate(0, 0) rotate(var(--rot, 0deg)); opacity: 0; }
            90% { transform: scale(0.5) translate(0, 0) rotate(var(--rot, 0deg)); opacity: 0.5; }
            100% { transform: scale(1) translate(0, 0) rotate(var(--rot, 0deg)); opacity: 1; }
        }

        /* ==========================================================================
           4. FORMULARIO E INPUTS (Compresión de Márgenes y Estilo)
           ========================================================================== */
        .logo-text { font-size: 26px; font-weight: bold; color: #144e28; margin: 0; letter-spacing: -0.5px; text-shadow: 0 1px 0 #fff; }
        .logo-text span { color: #247cb8; font-weight: normal; }
        .tagline { font-size: 11px; color: #617b94; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

        .field-group { margin-bottom: 12px; text-align: left; }
        .field-group label { display: block; font-size: 11px; font-weight: bold; color: #34495e; margin-bottom: 4px; }
        .field-group input {
            width: 100%; padding: 9px 12px; border: 1px solid #a5bfc0; border-radius: 4px; box-sizing: border-box;
            background: linear-gradient(180deg, #f7fafb 0%, #ffffff 100%); font-size: 13px; color: #2c3e50; outline: none;
            position: relative; z-index: 30;
        }
        .field-group input:focus { border-color: #3fa1ec; box-shadow: 0 0 5px rgba(63,161,236,0.6); }

        .btn-aero-capsule {
            width: 100%; padding: 11px; font-size: 13px; font-weight: bold; color: white; border: 1px solid #194d27; border-radius: 20px; cursor: pointer;
            background: linear-gradient(180deg, rgba(255,255,255,0.5) 0%, rgba(255,255,255,0) 50%), linear-gradient(180deg, #4ce078 0%, #24a14a 49%, #0f8233 50%, #0a5c23 100%);
            box-shadow: 0 3px 6px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.4); text-shadow: 0 -1px 1px rgba(0,0,0,0.3);
            position: relative; z-index: 30;
        }
        .btn-aero-capsule:hover { filter: brightness(1.06); }

        .feedback-msg { margin-top: 4px; font-size: 12px; text-align: center; min-height: 16px; font-weight: 600; }
