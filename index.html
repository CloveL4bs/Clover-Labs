<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clover Labs - Operating System Portal</title>
    <style>
        /* ==========================================================================
           1. ESCRITORIO WINDOWS AERO VISTA / 7
           ========================================================================== */
        body {
            margin: 0; padding: 0; height: 100vh; box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden;
            background: #154577;
            background-image: 
                radial-gradient(circle at 80% 20%, rgba(0, 220, 100, 0.35) 0%, transparent 45%),
                radial-gradient(circle at 15% 75%, rgba(43, 147, 232, 0.4) 0%, transparent 50%),
                linear-gradient(135deg, #1d6ca7 0%, #103860 50%, #08213b 100%);
            display: flex; justify-content: center; align-items: center; position: relative;
        }

        .taskbar {
            position: absolute; bottom: 0; left: 0; right: 0; height: 40px;
            background: rgba(0, 10, 30, 0.45); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-top: 1px solid rgba(255,255,255,0.2); z-index: 100; display: flex; align-items: center; padding: 0 10px;
        }
        .start-button {
            width: 32px; height: 32px; border-radius: 50%;
            background: radial-gradient(circle at center, #3fa1ec 0%, #155594 70%, #0c335c 100%);
            box-shadow: 0 0 8px rgba(63,161,236,0.8), inset 0 1px 2px rgba(255,255,255,0.6);
            cursor: pointer; border: 1px solid rgba(255,255,255,0.3);
        }

        /* ==========================================================================
           2. INTERFAZ DE VENTANA FIDELIDAD WINDOWS AERO (Bordes fijos perfectos)
           ========================================================================== */
        .aero-window {
            width: 460px; height: 440px; /* Tamaño total óptimo calculado */
            background: rgba(255, 255, 255, 0.22);
            backdrop-filter: blur(20px) saturate(160%); -webkit-backdrop-filter: blur(20px) saturate(160%);
            border: 4px solid rgba(255, 255, 255, 0.35);
            border-radius: 8px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.55), inset 0 1px 0 rgba(255,255,255,0.5);
            overflow: hidden; box-sizing: border-box; z-index: 10; position: relative; display: flex; flex-direction: column;
        }

        .window-header {
            background: linear-gradient(180deg, rgba(255,255,255,0.25) 0%, rgba(255,255,255,0.05) 50%, rgba(0,0,0,0.08) 50.1%, rgba(0,0,0,0.03) 100%);
            padding: 10px 14px; color: white; font-size: 12px; font-weight: normal; height: 40px; box-sizing: border-box;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.7); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(0, 0, 0, 0.2); user-select: none;
        }

        .window-controls { display: flex; gap: 3px; }
        .window-controls span {
            width: 28px; height: 16px; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25); border-radius: 2px; cursor: pointer; position: relative;
        }
        .window-controls span::after {
            content: ""; position: absolute; left: 8px; width: 12px; height: 2px; background: rgba(255,255,255,0.8);
        }
        .window-controls .min-btn::after { bottom: 4px; }
        .window-controls .max-btn::after { top: 4px; height: 7px; width: 10px; border: 1px solid rgba(255,255,255,0.8); background: transparent; left: 8px; }
        .window-controls .close-btn {
            background: linear-gradient(180deg, rgba(235, 90, 90, 0.4) 0%, rgba(180, 40, 40, 0.4) 100%); border-color: rgba(255,100,100,0.3);
        }
        .window-controls .close-btn:hover {
            background: linear-gradient(180deg, #ff5c5c 0%, #cc1122 100%); border-color: #990000; box-shadow: 0 0 8px rgba(255,0,0,0.6);
        }

        .window-body { background: #ffffff; flex: 1; padding: 20px 30px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: space-between; }

        /* ==========================================================================
           3. EL TRÉBOL DE 4 HOJAS ANIMADO (Ciclo de regeneración de hojas)
           ========================================================================== */
        .logo-container { display: flex; flex-direction: column; align-items: center; margin-bottom: 15px; }
        
        .clover-container {
            position: relative; width: 80px; height: 75px; margin-bottom: 5px;
        }

        .clover-stem {
            position: absolute; width: 4px; height: 22px; background: #1b733b;
            bottom: 2px; left: 38px; border-radius: 0 0 4px 4px; transform: rotate(10deg); z-index: 1;
        }

        .clover-leaf {
            position: absolute; width: 32px; height: 32px;
            background: linear-gradient(135deg, #a8fbc0 0%, #2ecc71 45%, #1e8449 100%);
            border-radius: 50% 50% 50% 0; box-shadow: inset -1px -1px 3px rgba(0,0,0,0.25), inset 1px 1px 4px rgba(255,255,255,0.7);
        }

        .leaf-top-left  { top: 5px; left: 24px; transform: rotate(-45deg); animation: cycleLeaf 4s infinite ease-in-out; }
        .leaf-top-right { top: 21px; left: 38px; transform: rotate(45deg); animation: cycleLeaf 4s infinite ease-in-out 1s; }
        .leaf-bot-right { top: 37px; left: 24px; transform: rotate(135deg); animation: cycleLeaf 4s infinite ease-in-out 2s; }
        .leaf-bot-left  { top: 21px; left: 10px; transform: rotate(225deg); animation: cycleLeaf 4s infinite ease-in-out 3s; }

        .clover-glass-shimmer {
            position: absolute; top: 7px; left: 18px; width: 44px; height: 20px;
            background: linear-gradient(180deg, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0) 100%);
            border-radius: 22px / 10px; pointer-events: none; z-index: 5;
        }

        @keyframes cycleLeaf {
            0% { transform: scale(1) translate(0, 0) rotate(var(--rot, 0deg)); opacity: 1; }
            30% { transform: scale(1.05) translate(0, 2px) rotate(calc(var(--rot, 0deg) + 5deg)); opacity: 1; }
            55% { transform: scale(0.9) translate(0, 25px) rotate(calc(var(--rot, 0deg) + 40deg)); opacity: 0; }
            75% { transform: scale(0) translate(0, 0) rotate(var(--rot, 0deg)); opacity: 0; }
            90% { transform: scale(0.5) translate(0, 0) rotate(var(--rot, 0deg)); opacity: 0.5; }
            100% { transform: scale(1) translate(0, 0) rotate(var(--rot, 0deg)); opacity: 1; }
        }

        /* ==========================================================================
           4. FORMULARIO E INPUTS (Compresión de Márgenes)
           ========================================================================== */
        .logo-text { font-size: 26px; font-weight: bold; color: #144e28; margin: 0; letter-spacing: -0.5px; }
        .logo-text span { color: #247cb8; font-weight: normal; }
        .tagline { font-size: 11px; color: #617b94; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

        .field-group { margin-bottom: 14px; text-align: left; }
        .field-group label { display: block; font-size: 11px; font-weight: bold; color: #34495e; margin-bottom: 4px; }
        .field-group input {
            width: 100%; padding: 8px 10px; border: 1px solid #a5bfc0; border-radius: 4px; box-sizing: border-box;
            background: linear-gradient(180deg, #f7fafb 0%, #ffffff 100%); font-size: 13px; color: #2c3e50; outline: none;
        }
        .field-group input:focus { border-color: #3fa1ec; box-shadow: 0 0 5px rgba(63,161,236,0.6); }

        .btn-aero-capsule {
            width: 100%; padding: 10px; font-size: 13px; font-weight: bold; color: white; border: 1px solid #194d27; border-radius: 20px; cursor: pointer;
            background: linear-gradient(180deg, rgba(255,255,255,0.5) 0%, rgba(255,255,255,0) 50%), linear-gradient(180deg, #4ce078 0%, #24a14a 49%, #0f8233 50%, #0a5c23 100%);
            box-shadow: 0 3px 6px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.4); text-shadow: 0 -1px 1px rgba(0,0,0,0.3);
        }
        .btn-aero-capsule:hover { filter: brightness(1.06); }

        .feedback-msg { margin-top: 5px; font-size: 12px; text-align: center; min-height: 16px; font-weight: 600; }
        .err { color: #c0392b; } .ok { color: #27ae60; }
        .arg-node { position: absolute; bottom: 52px; left: 15px; font-size: 11px; color: rgba(255,255,255,0.03); user-select: none; cursor: pointer; z-index: 40; }
        .arg-node:hover { color: rgba(255,255,255,0.5); }

        /* ==========================================================================
           5. INTERFAZ FASE 2: BROWSER DE PESTAÑAS (TABS AUTOMÁTICAS)
           ========================================================================== */
        .browser-layout { width: 100%; height: 100%; display: flex; flex-direction: column; background: #ffffff; }
        .tabs-bar { background: linear-gradient(180deg, rgba(0,0,0,0.03) 0%, rgba(0,0,0,0.08) 100%); display: flex; align-items: flex-end; padding: 6px 10px 0 10px; gap: 3px; border-bottom: 1px solid rgba(0, 0, 0, 0.15); user-select: none; height: 35px; box-sizing: border-box; }
        .tab { background: linear-gradient(180deg, rgba(240,245,250,0.7) 0%, rgba(215,225,235,0.7) 100%); border: 1px solid rgba(0,0,0,0.2); border-bottom: none; padding: 4px 12px; font-size: 11px; color: #34495e; border-radius: 4px 4px 0 0; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .tab.active { background: #ffffff; color: #144e28; font-weight: 600; border-color: rgba(0,0,0,0.2); position: relative; z-index: 2; margin-bottom: -1px; padding-bottom: 5px; }
