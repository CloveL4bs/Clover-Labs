<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clover Labs - Secure Terminal v2.5</title>
    <style>
        body {
            margin: 0; padding: 15px; height: 100vh; box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden;
            background: #19528d;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(135, 237, 107, 0.45) 0%, transparent 45%),
                radial-gradient(circle at 90% 10%, rgba(255, 255, 255, 0.3) 0%, transparent 35%),
                linear-gradient(145deg, #3fa1ec 0%, #155594 40%, #0c335c 70%, #135c24 100%);
            display: flex; justify-content: center; align-items: center; position: relative;
        }
        body::before {
            content: ""; position: absolute; top: 0; left: 0; right: 0; height: 45%;
            background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0) 100%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1); pointer-events: none; z-index: -1;
        }
        .aero-window {
            width: 500px; background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(10px) saturate(140%); -webkit-backdrop-filter: blur(10px) saturate(140%);
            border: 1px solid rgba(255, 255, 255, 0.5); border-top: 1.5px solid rgba(255, 255, 255, 0.7);
            border-radius: 8px; box-shadow: 0 15px 45px rgba(0, 20, 50, 0.4);
            overflow: hidden; box-sizing: border-box; z-index: 10; position: relative; transition: all 0.3s ease;
        }
        .window-header {
            background: linear-gradient(180deg, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0.05) 50%, rgba(0,0,0,0.1) 50.1%, rgba(0,0,0,0.05) 100%);
            padding: 12px 16px; color: rgba(255, 255, 255, 0.95); font-size: 13px; font-weight: 600;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.6); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(0, 0, 0, 0.2); user-select: none;
        }
        .window-controls span { width: 26px; height: 18px; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); border-radius: 3px; display: inline-block;}
        .window-body { background: linear-gradient(180deg, rgba(255,255,255,0.95) 0%, rgba(240,247,255,0.98) 100%); }
        .login-padding { padding: 30px; }
        
        /* Contenedor del Logo con Trébol 3D de 4 Hojas */
        .logo-container { display: flex; flex-direction: column; align-items: center; margin-bottom: 25px; }
        
        .clover-3d {
            position: relative; width: 60px; height: 60px; margin-bottom: 10px;
            filter: drop-shadow(0 4px 8px rgba(0,40,10,0.25));
        }
        /* Construcción geométrica de las 4 hojas de cristal líquido */
        .leaf {
            position: absolute; width: 26px; height: 26px;
            background: linear-gradient(135deg, #a3f7b5 0%, #2ecc71 40%, #27ae60 100%);
            border-radius: 50% 50% 50% 0; box-shadow: inset -1px -1px 3px rgba(0,0,0,0.2), inset 1px 1px 4px rgba(255,255,255,0.6);
        }
        /* Rotación exacta para formar las 4 hojas */
        .l1 { top: 4px; left: 17px; transform: rotate(-45deg); }
        .l2 { top: 17px; left: 30px; transform: rotate(45deg); }
        .l3 { top: 30px; left: 17px; transform: rotate(135deg); }
        .l4 { top: 17px; left: 4px; transform: rotate(225deg); }
        /* Tallo del trébol */
        .stem {
            position: absolute; width: 4px; height: 18px; background: #1e7e43;
            bottom: -4px; left: 28px; border-radius: 0 0 4px 4px; transform: rotate(15deg); z-index: -1;
        }
        /* Reflejo de brillo glossy de los años 2000 encima del trébol */
        .clover-3d::after {
            content: ""; position: absolute; top: 6px; left: 12px; width: 36px; height: 16px;
            background: linear-gradient(180deg, rgba(255,255,255,0.5) 0%, rgba(255,255,255,0) 100%);
            border-radius: 18px / 8px; pointer-events: none;
        }

        .logo-text { font-size: 28px; font-weight: 800; color: #17522b; margin: 0; text-shadow: 0 1px 0 #fff; }
        .logo-text span { color: #2383cf; font-weight: 400; }
        .tagline { font-size: 11px; color: #597d9a; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }
        .field-group { margin-bottom: 18px; position: relative; }
        .field-group label { display: block; font-size: 11px; font-weight: bold; color: #315377; margin-bottom: 6px; }
        .field-group input {
            width: 100%; padding: 9px 12px; border: 1px solid #a3bccc; border-radius: 4px; box-sizing: border-box;
            background: linear-gradient(180deg, #f9fbfd 0%, #ffffff 100%); font-size: 14px; color: #1d354d; outline: none; position: relative; z-index: 30;
        }
        .btn-aero-capsule {
            width: 100%; padding: 11px; font-size: 14px; font-weight: bold; color: white; border: 1px solid #1f5731; border-radius: 25px; cursor: pointer;
            background: linear-gradient(180deg, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0) 50%), linear-gradient(180deg, #4ce078 0%, #24a14a 49%, #0f8233 50%, #0a5c23 100%);
            box-shadow: 0 4px 10px rgba(0,30,10,0.25), inset 0 1px 0 rgba(255,255,255,0.4); text-shadow: 0 -1px 1px rgba(0,0,0,0.4); position: relative; z-index: 30;
        }
        .feedback-msg { margin-top: 15px; font-size: 12px; text-align: center; min-height: 18px; font-weight: 600; }
        .err { color: #be1e1e; } .ok { color: #177a2f; }
        .arg-node { position: absolute; bottom: 12px; left: 15px; font-size: 11px; color: rgba(255,255,255,0.03); user-select: none; cursor: pointer; z-index: 40; }
        .arg-node:hover { color: rgba(255,255,255,0.6); }
        .browser-layout { width: 100%; height: 85vh; display: flex; flex-direction: column; }
        .tabs-bar { background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, rgba(0,0,0,0.05) 100%); display: flex; align-items: flex-end; padding: 8px 10px 0 10px; gap: 4px; border-bottom: 1px solid rgba(0, 0, 0, 0.15); user-select: none; }
        .tab { background: linear-gradient(180deg, rgba(240,245,250,0.7) 0%, rgba(215,225,235,0.7) 100%); border: 1px solid rgba(0,0,0,0.2); border-bottom: none; padding: 6px 15px; font-size: 12px; color: #2c4054; border-radius: 5px 5px 0 0; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .tab.active { background: linear-gradient(180deg, #ffffff 0%, #f4f8fb 100%); color: #0b3a1a; font-weight: 600; border-color: rgba(0,0,0,0.25); position: relative; z-index: 2; margin-bottom: -1px; padding-bottom: 7px; }
        .close-tab-btn { font-size: 10px; font-weight: bold; color: #8899aa; padding: 1px 4px; border-radius: 2px; }
        .close-tab-btn:hover { background-color: #e81123; color: white; }
        .navigation-bar { background: linear-gradient(180deg, #f4f8fb 0%, #e4eff7 100%); padding: 6px 12px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #b2c8db; }
        .nav-btn { width: 24px; height: 24px; border-radius: 50%; border: 1px solid #9bb7d4; background: linear-gradient(180deg, #ffffff 0%, #e6eff7 100%); color: #55708c; display: flex; justify-content: center; align-items: center; }
        .url-bar { flex: 1; padding: 5px 10px; border: 1px solid #a3bccc; border-radius: 4px; background: white; font-size: 13px; color: #3b5975; display: flex; align-items: center; gap: 6px; }
        .url-secure-icon { color: #27ae60; font-size: 11px; font-weight: bold; }
        .page-content { flex: 1; background: white; padding: 30px; overflow-y: auto; color: #203525; line-height: 1.6; }
        .doc-title { color: #114d24; border-bottom: 2px solid #3fa1ec; padding-bottom: 6px; margin-top: 0; font-size: 24px; }
        .meta-info { font-size: 12px; color: #667788; margin-bottom: 20px; background: #f4f8fb; padding: 8px 12px; border-radius: 4px; border: 1px solid #e1ebf2; }
        .censored { background: #222; color: #222; padding: 0 4px; border-radius: 2px; cursor: help; transition: all 0.2s; user-select: none; }
        .censored:hover { background: #c0392b; color: white; user-select: auto; }
        
        .wmp-player {
            background: linear-gradient(180deg, #333 0%, #111 100%);
            border: 2px solid #555; border-radius: 6px; padding: 15px;
            color: #5cd682; font-family: monospace; max-width: 400px; margin: 20px 0;
            box-shadow: inset 0 1px 3px rgba(255,255,255,0.2);
        }
        .wmp-display { background: black; border: 1px solid #444; height: 40px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; font-size: 12px; }
    </style>
</head>
<body>

    <div class="aero-window" id="mainContainer">
        <div class="window-header">
            <span id="windowTitle">CloverLabs_Intranet_Gate_v2.0</span>
            <div class="window-controls">
                <span></span><span></span><span></span>
            </div>
        </div>
        
        <div class="window-body login-padding" id="viewContent">
            <div class="logo-container">
                <!-- Logotipo Frutiger Aero Vectorial de 4 Hojas -->
                <div class="clover-3d">
                    <div class="leaf l1"></div>
                    <div class="leaf l2"></div>
                    <div class="leaf l3"></div>
                    <div class="leaf l4"></div>
                    <div class="stem"></div>
                </div>
                <h1 class="logo-text">Clover<span>Labs</span></h1>
                <div class="tagline">Ecología Avanzada y Bioseguridad Global</div>
            </div>
            <form onsubmit="handlePortalLogin(event)">
                <div class="field-group">
                    <label for="scientistId">ID del Investigador:</label>
